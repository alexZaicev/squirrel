name: PR Title Lint

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

jobs:
  pr-title-lint:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title prefix
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          PATTERN='^(feat|feature|fix|docs|chore)(\([a-zA-Z0-9_/-]+\))?:'
          if echo "$PR_TITLE" | grep -qE "$PATTERN"; then
            echo "✅ PR title is valid: $PR_TITLE"
          else
            echo "❌ PR title does not match the required format."
            echo ""
            echo "The title must start with one of the following prefixes:"
            echo "  feat: / feature: / feat(scope): / feature(scope):  — for features"
            echo "  fix: / fix(scope):                                  — for bug fixes"
            echo "  docs: / docs(scope):                                — for documentation updates"
            echo "  chore: / chore(scope):                              — for automation chores"
            echo ""
            echo "Examples:"
            echo "  feat: add new builder method"
            echo "  fix(select): handle nil columns"
            echo "  docs: update README"
            echo "  chore(ci): add linting workflow"
            exit 1
          fi
